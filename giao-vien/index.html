    <title>Đang chuyển hướng đến Hệ thống Giáo viên</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 10px;"></div>
        <p>Đang chuyển hướng đến trang Giáo viên, vui lòng đợi giây lát...</p>
        <p><small>Nếu trang không tự chuyển, <a href="https://script.google.com/macros/s/AKfycbxtUUnJB9MhZzkQF5UhNn2xrM_pKwPPAUI96chT_j7vzIsRiUwsH2a4SNVsL-U8CP0sJQ/exec">bấm vào đây</a>.</small></p>
